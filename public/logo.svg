<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .light-mode { display: none; }
        .dark-mode { display: block; }
      }
      @media (prefers-color-scheme: light) {
        .light-mode { display: block; }
        .dark-mode { display: none; }
      }
    </style>
  </defs>
  
  <!-- Light mode colors -->
  <g class="light-mode">
    <!-- Central node -->
    <circle cx="60" cy="60" r="12" fill="#3B82F6" />
    
    <!-- Outer nodes -->
    <circle cx="60" cy="22" r="8" fill="#06B6D4" opacity="0.8" />
    <circle cx="92" cy="42" r="8" fill="#06B6D4" opacity="0.8" />
    <circle cx="82" cy="83" r="8" fill="#06B6D4" opacity="0.8" />
    <circle cx="38" cy="83" r="8" fill="#06B6D4" opacity="0.8" />
    <circle cx="28" cy="42" r="8" fill="#06B6D4" opacity="0.8" />
    
    <!-- Connection lines -->
    <line x1="60" y1="34" x2="60" y2="52" stroke="#3B82F6" stroke-width="2" opacity="0.6" />
    <line x1="60" y1="68" x2="82" y2="75" stroke="#3B82F6" stroke-width="2" opacity="0.6" />
    <line x1="48" y1="72" x2="38" y2="83" stroke="#3B82F6" stroke-width="2" opacity="0.6" />
    <line x1="48" y1="48" x2="28" y2="42" stroke="#3B82F6" stroke-width="2" opacity="0.6" />
    <line x1="76" y1="48" x2="92" y2="42" stroke="#3B82F6" stroke-width="2" opacity="0.6" />
  </g>
  
  <!-- Dark mode colors -->
  <g class="dark-mode">
    <!-- Central node -->
    <circle cx="60" cy="60" r="12" fill="#60A5FA" />
    
    <!-- Outer nodes -->
    <circle cx="60" cy="22" r="8" fill="#22D3EE" opacity="0.8" />
    <circle cx="92" cy="42" r="8" fill="#22D3EE" opacity="0.8" />
    <circle cx="82" cy="83" r="8" fill="#22D3EE" opacity="0.8" />
    <circle cx="38" cy="83" r="8" fill="#22D3EE" opacity="0.8" />
    <circle cx="28" cy="42" r="8" fill="#22D3EE" opacity="0.8" />
    
    <!-- Connection lines -->
    <line x1="60" y1="34" x2="60" y2="52" stroke="#60A5FA" stroke-width="2" opacity="0.6" />
    <line x1="60" y1="68" x2="82" y2="75" stroke="#60A5FA" stroke-width="2" opacity="0.6" />
    <line x1="48" y1="72" x2="38" y2="83" stroke="#60A5FA" stroke-width="2" opacity="0.6" />
    <line x1="48" y1="48" x2="28" y2="42" stroke="#60A5FA" stroke-width="2" opacity="0.6" />
    <line x1="76" y1="48" x2="92" y2="42" stroke="#60A5FA" stroke-width="2" opacity="0.6" />
  </g>
</svg>
